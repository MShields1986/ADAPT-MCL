    command: timeout --signal=INT 180 roslaunch lilocbench_ros static_5.launch launch_rviz:=false

  static_6:
    <<: *localiser-base
    networks: [net_static_6]
    profiles: [test]
    command: timeout --signal=INT 870 roslaunch lilocbench_ros static_6.launch launch_rviz:=false

  dynamics_1:
    <<: *localiser-base
    networks: [net_dynamics_1]
    profiles: [test]
    command: timeout --signal=INT 200 roslaunch lilocbench_ros dynamics_1.launch launch_rviz:=false

  dynamics_2:
    <<: *localiser-base
